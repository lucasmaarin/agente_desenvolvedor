<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arauto Code — Login</title>
  <link rel="icon" type="image/png" href="/static/img/logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f8f8f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      padding: 40px 36px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin: 16px;
    }

    .login-logo {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      overflow: hidden;
    }
    .login-logo img { width: 100%; height: 100%; object-fit: contain; }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #f8f8f8;
      letter-spacing: -0.4px;
    }

    .login-subtitle {
      font-size: 13px;
      color: #888;
      margin-top: -16px;
    }

    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f8f8f8;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus {
      border-color: #5dd62c;
    }
    input[type="password"]::placeholder { color: #555; }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #5dd62c, #337418);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button[type="submit"]:hover { opacity: 0.88; }
    button[type="submit"]:active { opacity: 0.75; }

    .error-msg {
      width: 100%;
      padding: 10px 14px;
      background: rgba(220, 50, 50, 0.12);
      border: 1px solid rgba(220, 50, 50, 0.3);
      border-radius: 8px;
      color: #f87171;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="/static/img/logo.png" alt="Arauto Code">
    </div>
    <div class="login-title">Arauto Code</div>
    <div class="login-subtitle">Acesso restrito</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="Senha de acesso" autofocus autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
